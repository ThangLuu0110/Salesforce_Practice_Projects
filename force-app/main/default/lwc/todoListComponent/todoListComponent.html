<template>
    <div class="taskList">
        <header class="taskList_header">
            <h1 class="taskList_title">{title}</h1>
            <form class="taskList_form">
                <div class="taskList_form-inputs">
                    <lightning-input 
                        class="taskList_form-input taskName" 
                        type="text" 
                        label="Task Name" 
                        placeholder="Enter Task Name"
                        value={taskNameValue}
                        onchange={handleTaskNameChange}
                        required="true"
                    ></lightning-input>
                    <lightning-input 
                        class="taskList_form-input taskDeadline" 
                        type="date" 
                        label="Deadline" 
                        placeholder="Enter Deadline"
                        value={taskDeadline}
                        onchange={handleDeadlineChange}
                        required="true"
                    ></lightning-input>
                </div>
                <div class="taskList_form-button">
                    <template if:true={isUpdateMode}>
                        <lightning-button label="Update" variant="brand" onclick={updateTask}></lightning-button>
                    </template>
                    <template if:false={isUpdateMode}>
                        <lightning-button label="Add" variant="brand" onclick={addNewTask}></lightning-button>  
                    </template>
                </div>
            </form>
        </header>
        <section class="taskList_section">
            <!-- Task List Section -->
            <ul class="taskList_section-items">
                <template if:true={todoTasksLists.data}>
                    <h2><b>Todo Tasks ({todoTasksLists.data.length})</b></h2>
                    <template for:each={todoTasksLists.data} for:item="task" for:index="index">
                        <li class="taskList_section-item" key={task.Id}>
                            <div class="taskList_section-item_checkbox">
                                <lightning-input class="taskList_form-input taskChecked" type="checkbox"></lightning-input>
                            </div>
                            <div class="taskList_section-item_infor">
                                <span class="taskList_section-item_name"><b>Task:</b> {task.Name}</span>
                                <span class="taskList_section-item_deadline"><b>Deadline:</b> {task.Tasks_Deadline__c}</span>
                            </div>
                            <div class="taskList_section-item_actions">
                                <lightning-button label="Edit" variant="brand" onclick={handleEditTask} data-id={task.Id}></lightning-button>
                                <lightning-button label="Delete" variant="destructive" onclick={deleteTask} data-id={task.Id}></lightning-button>
                            </div>
                        </li>
                    </template>
                </template>
            </ul>
        </section>
    </div>
</template>
